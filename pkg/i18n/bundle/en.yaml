# HelixMemory i18n bundle — English (en) baseline.
#
# CONST-046 (No-Hardcoded-Content) resource bundle. Every key carries the
# mandatory `helixmemory_` prefix for cross-submodule bundle-merger uniqueness.
#
# Round-359 §11.4 — CONST-046 Phase 4: first batch of user-facing strings
# migrated off static literals. These keys back surfaces an end user observes
# directly: MCP tool descriptions (rendered in MCP clients), codebase-DNA
# pattern descriptions (surfaced in Profile structs returned to callers), and
# quality-loop recommended-action descriptions (surfaced in QualityReport).
#
# Format-string values follow Go fmt verb semantics — the bundle, NOT the
# call site, owns the format string (CONST-046: callers MUST NOT pre-format).
#
# Consumers shipping additional locales MUST add a sibling file (e.g.
# sr-Cyrl-RS.yaml) with the SAME key set; a missing key falls through to the
# verbatim key per the Translator contract.

